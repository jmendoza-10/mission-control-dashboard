<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>

  <!-- NES.css -->
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
  <!-- Press Start 2P -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg-deep: #0a0a1a;
      --bg-panel: #12122a;
      --bg-panel-alt: #1a1a3e;
      --border-color: #2a2a5a;
      --text-primary: #00ff41;
      --text-secondary: #8888aa;
      --text-dim: #555577;
      --accent-green: #00ff41;
      --accent-red: #ff4444;
      --accent-yellow: #f5a623;
      --accent-orange: #ff8c00;
      --accent-blue: #4488ff;
      --accent-purple: #8844cc;
      --belt-gray: #3a3a5a;
      --scanline-opacity: 0.04;
      --font-main: 'Press Start 2P', monospace;
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: var(--bg-deep);
      color: var(--text-primary);
      font-size: 8px;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== CRT OVERLAY ===== */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, var(--scanline-opacity)) 2px,
        rgba(0, 0, 0, var(--scanline-opacity)) 4px
      );
    }

    /* CRT flicker */
    @keyframes crt-flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.985; }
    }
    body { animation: crt-flicker 4s infinite; }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-panel);
      border-bottom: 2px solid var(--accent-green);
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 14px;
      color: var(--accent-green);
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5), 0 0 20px rgba(0, 255, 65, 0.2);
      letter-spacing: 2px;
    }

    .header-mission {
      font-size: 7px;
      color: var(--text-secondary);
      max-width: 320px;
      font-style: italic;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 8px;
    }

    .header-clock {
      color: var(--accent-green);
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.4);
      font-size: 10px;
    }

    .header-uptime {
      color: var(--text-secondary);
    }

    .health-bar-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .health-bar {
      width: 80px;
      height: 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }

    .health-bar-fill {
      height: 100%;
      background: var(--accent-green);
      transition: width 0.5s ease;
      box-shadow: 0 0 4px rgba(0, 255, 65, 0.5);
    }

    .health-label {
      color: var(--accent-green);
      font-size: 7px;
    }

    /* ===== MAIN LAYOUT ===== */
    .main {
      display: grid;
      grid-template-columns: 200px 1fr 220px;
      gap: 0;
      min-height: calc(100vh - 90px);
    }

    /* ===== PANEL BASE ===== */
    .panel {
      background: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      padding: 12px;
      overflow-y: auto;
    }

    .panel:last-child {
      border-right: none;
      border-left: 1px solid var(--border-color);
    }

    .panel-title {
      font-size: 9px;
      color: var(--accent-green);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-color);
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.3);
    }

    /* ===== SERVICES PANEL (LEFT) ===== */
    .service-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 6px;
      border-bottom: 1px solid rgba(42, 42, 90, 0.5);
    }

    .service-item:last-child { border-bottom: none; }

    .service-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .service-dot.active {
      background: var(--accent-green);
      box-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
    }

    .service-dot.pending {
      background: var(--text-dim);
    }

    .service-dot.error {
      background: var(--accent-red);
      box-shadow: 0 0 6px rgba(255, 68, 68, 0.6);
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .service-info { flex: 1; }

    .service-name {
      font-size: 8px;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .service-meta {
      font-size: 6px;
      color: var(--text-dim);
    }

    .service-throughput {
      font-size: 6px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Resource bars */
    .resources-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    .resource-item {
      margin-bottom: 10px;
    }

    .resource-label {
      font-size: 7px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .resource-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-deep);
      border: 1px solid var(--border-color);
      position: relative;
    }

    .resource-bar-fill {
      height: 100%;
      transition: width 0.5s ease;
    }

    .resource-bar-fill.green { background: var(--accent-green); }
    .resource-bar-fill.yellow { background: var(--accent-yellow); }
    .resource-bar-fill.red { background: var(--accent-red); }

    .resource-value {
      font-size: 6px;
      color: var(--text-dim);
      text-align: right;
      margin-top: 2px;
    }

    /* ===== FACTORY FLOOR (CENTER) ===== */
    .factory-panel {
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .factory-header {
      font-size: 9px;
      color: var(--accent-green);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px;
      text-align: center;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.3);
    }

    .factory-floor {
      flex: 1;
      position: relative;
      padding: 16px;
    }

    /* Machine nodes on the factory floor */
    .machine {
      position: absolute;
      width: 100px;
      height: 80px;
      background: var(--bg-panel-alt);
      border: 2px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .machine:hover {
      border-color: var(--accent-green);
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.2);
    }

    .machine.running {
      border-color: var(--accent-orange);
      box-shadow: 0 0 12px rgba(255, 140, 0, 0.3);
    }

    .machine.error {
      border-color: var(--accent-red);
      animation: machine-error 1s infinite;
    }

    @keyframes machine-error {
      0%, 100% { box-shadow: 0 0 4px rgba(255, 68, 68, 0.3); }
      50% { box-shadow: 0 0 16px rgba(255, 68, 68, 0.6); }
    }

    .machine-gears {
      font-size: 16px;
      margin-bottom: 4px;
      line-height: 1;
    }

    .machine.idle .machine-gears { color: var(--text-dim); }
    .machine.running .machine-gears { color: var(--accent-orange); }
    .machine.error .machine-gears { color: var(--accent-red); }

    @keyframes spin-gears {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .machine.running .machine-gears {
      animation: spin-gears 2s linear infinite;
      display: inline-block;
    }

    .machine-name {
      font-size: 7px;
      color: var(--text-primary);
      text-align: center;
    }

    .machine-status {
      font-size: 6px;
      margin-top: 2px;
    }

    .machine-status.success { color: var(--accent-green); }
    .machine-status.idle { color: var(--text-dim); }
    .machine-status.running { color: var(--accent-orange); }
    .machine-status.error { color: var(--accent-red); }

    /* Conveyor belts */
    .belt {
      position: absolute;
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        var(--belt-gray) 0px,
        var(--belt-gray) 6px,
        var(--bg-deep) 6px,
        var(--bg-deep) 12px
      );
      background-size: 12px 12px;
      border: 1px solid rgba(60, 60, 100, 0.5);
      animation: belt-scroll 0.8s linear infinite;
    }

    @keyframes belt-scroll {
      0% { background-position: 0 0; }
      100% { background-position: 12px 0; }
    }

    .belt-vertical {
      width: 12px;
      height: auto;
      background: repeating-linear-gradient(
        180deg,
        var(--belt-gray) 0px,
        var(--belt-gray) 6px,
        var(--bg-deep) 6px,
        var(--bg-deep) 12px
      );
      background-size: 12px 12px;
      animation: belt-scroll-v 0.8s linear infinite;
    }

    @keyframes belt-scroll-v {
      0% { background-position: 0 0; }
      100% { background-position: 0 12px; }
    }

    /* Belt items flowing */
    .belt-item {
      position: absolute;
      font-size: 10px;
      animation: flow-right 3s linear infinite;
      filter: drop-shadow(0 0 2px rgba(0, 255, 65, 0.3));
    }

    @keyframes flow-right {
      0% { left: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { left: calc(100% - 16px); opacity: 0; }
    }

    /* Service source/sink nodes */
    .service-node {
      position: absolute;
      background: var(--bg-panel);
      border: 1px solid var(--accent-blue);
      padding: 4px 8px;
      font-size: 6px;
      color: var(--accent-blue);
      text-align: center;
    }

    .factory-legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      padding: 8px;
      font-size: 6px;
      color: var(--text-dim);
      border-top: 1px solid var(--border-color);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ===== PRODUCTION STATS (RIGHT) ===== */
    .stat-card {
      margin-bottom: 12px;
      padding: 8px;
      background: var(--bg-panel-alt);
      border: 1px solid var(--border-color);
    }

    .stat-label {
      font-size: 7px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .stat-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-bar {
      flex: 1;
      height: 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      background: var(--accent-green);
      box-shadow: inset 0 0 4px rgba(0, 255, 65, 0.3);
      transition: width 0.5s ease;
    }

    .stat-value {
      font-size: 8px;
      color: var(--accent-green);
      min-width: 30px;
      text-align: right;
    }

    /* Sparkline */
    .sparkline-container {
      margin-top: 8px;
      padding: 8px;
      background: var(--bg-panel-alt);
      border: 1px solid var(--border-color);
    }

    .sparkline-label {
      font-size: 7px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .sparkline {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
    }

    .sparkline-bar {
      flex: 1;
      background: var(--accent-green);
      min-width: 4px;
      transition: height 0.3s ease;
      opacity: 0.8;
    }

    .sparkline-bar:last-child {
      opacity: 1;
      background: var(--accent-yellow);
    }

    .sparkline-meta {
      display: flex;
      justify-content: space-between;
      font-size: 6px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Cost tracker */
    .cost-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    .cost-row {
      display: flex;
      justify-content: space-between;
      font-size: 7px;
      margin-bottom: 4px;
    }

    .cost-label { color: var(--text-secondary); }
    .cost-value { color: var(--accent-yellow); }

    /* Task schedule section */
    .schedule-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 6px;
      border-bottom: 1px solid rgba(42, 42, 90, 0.3);
    }

    .schedule-name { color: var(--text-secondary); }
    .schedule-time { color: var(--accent-blue); }

    .schedule-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .schedule-dot.success { background: var(--accent-green); }
    .schedule-dot.pending { background: var(--text-dim); }

    /* ===== ALERT TICKER (BOTTOM) ===== */
    .ticker-bar {
      background: var(--bg-panel);
      border-top: 2px solid var(--accent-green);
      padding: 6px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .ticker-content {
      display: inline-block;
      animation: ticker-scroll 60s linear infinite;
      font-size: 7px;
    }

    .ticker-content:hover {
      animation-play-state: paused;
    }

    @keyframes ticker-scroll {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }

    .ticker-item {
      display: inline;
      margin-right: 40px;
    }

    .ticker-item .tick-icon { margin-right: 4px; }
    .ticker-item.success { color: var(--accent-green); }
    .ticker-item.warning { color: var(--accent-yellow); }
    .ticker-item.error { color: var(--accent-red); }
    .ticker-item.info { color: var(--accent-blue); }

    .ticker-time {
      color: var(--text-dim);
      margin-right: 6px;
    }

    /* ===== MACHINE DETAIL POPUP ===== */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .popup-overlay.visible {
      display: flex;
    }

    .popup {
      background: var(--bg-panel);
      border: 2px solid var(--accent-green);
      padding: 16px;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    }

    .popup-title {
      font-size: 10px;
      color: var(--accent-green);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 7px;
      margin-bottom: 6px;
    }

    .popup-key { color: var(--text-secondary); }
    .popup-val { color: var(--text-primary); }

    .popup-close {
      margin-top: 12px;
      font-family: var(--font-main);
      font-size: 7px;
      background: var(--bg-deep);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
      padding: 6px 12px;
      cursor: pointer;
      width: 100%;
    }

    .popup-close:hover {
      background: var(--accent-green);
      color: var(--bg-deep);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 800px) {
      .main {
        grid-template-columns: 1fr;
      }
      .panel { border-right: none; border-bottom: 1px solid var(--border-color); }
      .factory-floor { min-height: 400px; }
    }

    /* ===== NES.CSS OVERRIDES ===== */
    .nes-container {
      background: var(--bg-panel-alt) !important;
      color: var(--text-primary) !important;
    }

    .nes-container.is-dark {
      background: var(--bg-panel) !important;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <span class="header-title">MISSION CONTROL</span>
      <span class="header-mission">"Build autonomous AI that produces value 24/7"</span>
    </div>
    <div class="header-right">
      <div class="health-bar-container">
        <div class="health-bar">
          <div class="health-bar-fill" id="healthBar" style="width: 80%"></div>
        </div>
        <span class="health-label" id="healthLabel">80%</span>
      </div>
      <span class="header-uptime" id="uptime">UPTIME: --d</span>
      <span class="header-clock" id="clock">--:--:--</span>
    </div>
  </header>

  <!-- ===== MAIN 3-PANEL LAYOUT ===== -->
  <div class="main">

    <!-- LEFT: SERVICES -->
    <div class="panel" id="servicesPanel">
      <div class="panel-title">Services</div>
      <div id="servicesList"></div>

      <div class="resources-section">
        <div class="panel-title">Resources</div>
        <div class="resource-item">
          <div class="resource-label">Tokens (Daily)</div>
          <div class="resource-bar">
            <div class="resource-bar-fill green" id="tokenBar" style="width: 62%"></div>
          </div>
          <div class="resource-value" id="tokenValue">125K / 200K</div>
        </div>
        <div class="resource-item">
          <div class="resource-label">API Calls</div>
          <div class="resource-bar">
            <div class="resource-bar-fill green" id="apiBar" style="width: 28%"></div>
          </div>
          <div class="resource-value" id="apiValue">28 / 100</div>
        </div>
      </div>
    </div>

    <!-- CENTER: FACTORY FLOOR -->
    <div class="factory-panel">
      <div class="factory-header">Factory Floor</div>
      <div class="factory-floor" id="factoryFloor">
        <!-- Machines and belts are rendered by JS -->
      </div>
      <div class="factory-legend">
        <span class="legend-item"><span style="color:var(--accent-orange)">&#9881;</span> Running</span>
        <span class="legend-item"><span style="color:var(--text-dim)">&#9675;</span> Idle</span>
        <span class="legend-item"><span style="color:var(--accent-red)">&#9888;</span> Error</span>
        <span class="legend-item">&gt;&gt;&gt; Items on belt</span>
      </div>
    </div>

    <!-- RIGHT: PRODUCTION STATS -->
    <div class="panel" id="statsPanel">
      <div class="panel-title">Production Stats</div>

      <div id="statCards"></div>

      <!-- Token sparkline -->
      <div class="sparkline-container" id="sparklineContainer">
        <div class="sparkline-label">Token Usage (7d)</div>
        <div class="sparkline" id="sparkline"></div>
        <div class="sparkline-meta">
          <span id="sparklineStart">--</span>
          <span id="sparklineEnd">--</span>
        </div>
      </div>

      <!-- Cost -->
      <div class="cost-section">
        <div class="panel-title">Cost Tracker</div>
        <div class="cost-row">
          <span class="cost-label">Today</span>
          <span class="cost-value" id="costToday">$--</span>
        </div>
        <div class="cost-row">
          <span class="cost-label">This Week</span>
          <span class="cost-value" id="costWeek">$--</span>
        </div>
      </div>

      <!-- Schedule -->
      <div class="schedule-section">
        <div class="panel-title">Upcoming</div>
        <div id="scheduleList"></div>
      </div>
    </div>
  </div>

  <!-- ===== ALERT TICKER ===== -->
  <div class="ticker-bar">
    <div class="ticker-content" id="ticker"></div>
  </div>

  <!-- ===== MACHINE DETAIL POPUP ===== -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="popup-title" id="popupTitle">--</div>
      <div id="popupBody"></div>
      <button class="popup-close" onclick="closePopup()">[ CLOSE ]</button>
    </div>
  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    // ===== STATE =====
    let tasksData = null;
    let activityData = null;
    let servicesData = null;
    let metricsData = null;

    // ===== CLOCK =====
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ===== DATA LOADING =====
    const DATA_BASE = './data/';

    async function loadJSON(file) {
      try {
        const res = await fetch(DATA_BASE + file + '?t=' + Date.now());
        if (!res.ok) throw new Error(`${res.status}`);
        return await res.json();
      } catch (e) {
        console.warn(`Failed to load ${file}:`, e.message);
        return null;
      }
    }

    async function refreshData() {
      const [t, a, s, m] = await Promise.all([
        loadJSON('tasks.json'),
        loadJSON('activity.json'),
        loadJSON('services.json'),
        loadJSON('metrics.json')
      ]);
      if (t) { tasksData = t; renderFactoryFloor(); renderSchedule(); }
      if (a) { activityData = a; renderTicker(); }
      if (s) { servicesData = s; renderServices(); updateHealth(); }
      if (m) { metricsData = m; renderStats(); renderSparkline(); renderCosts(); updateUptime(); }
    }

    // ===== RENDER: SERVICES =====
    function renderServices() {
      const el = document.getElementById('servicesList');
      if (!servicesData) return;
      el.innerHTML = servicesData.services.map(svc => {
        const statusClass = svc.status === 'active' ? 'active' : svc.status === 'error' ? 'error' : 'pending';
        const statusLabel = svc.status === 'active' ? 'OK' : svc.status === 'error' ? 'ERR' : 'N/A';
        const checked = svc.lastChecked ? timeAgo(svc.lastChecked) : 'never';
        return `
          <div class="service-item">
            <div class="service-dot ${statusClass}"></div>
            <div class="service-info">
              <div class="service-name">${svc.name}</div>
              <div class="service-meta">${statusLabel} · ${checked}</div>
              <div class="service-throughput">Today: ${svc.throughput.today} · Week: ${svc.throughput.week}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ===== RENDER: FACTORY FLOOR =====
    function renderFactoryFloor() {
      const floor = document.getElementById('factoryFloor');
      if (!tasksData) return;

      const tasks = tasksData.tasks;
      floor.innerHTML = '';

      // Layout positions for machines
      const positions = [
        { x: 40, y: 30 },
        { x: 260, y: 30 },
        { x: 40, y: 180 },
        { x: 260, y: 180 }
      ];

      // Draw belts between adjacent machines
      const beltConfigs = [
        { from: 0, to: 1, type: 'horizontal' },
        { from: 0, to: 2, type: 'vertical' },
        { from: 1, to: 3, type: 'vertical' },
        { from: 2, to: 3, type: 'horizontal' }
      ];

      beltConfigs.forEach(bc => {
        if (bc.from >= tasks.length || bc.to >= tasks.length) return;
        const fromPos = positions[bc.from];
        const toPos = positions[bc.to];
        const belt = document.createElement('div');

        if (bc.type === 'horizontal') {
          belt.className = 'belt';
          belt.style.left = (fromPos.x + 100) + 'px';
          belt.style.top = (fromPos.y + 34) + 'px';
          belt.style.width = (toPos.x - fromPos.x - 100) + 'px';
        } else {
          belt.className = 'belt belt-vertical';
          belt.style.left = (fromPos.x + 44) + 'px';
          belt.style.top = (fromPos.y + 80) + 'px';
          belt.style.height = (toPos.y - fromPos.y - 80) + 'px';
        }
        floor.appendChild(belt);

        // Add flowing items on belts
        if (tasks[bc.from].lastResult === 'success' || tasks[bc.to].lastResult === 'success') {
          const icons = ['&#9993;', '&#128196;', '&#128202;', '&#128269;'];
          const item = document.createElement('div');
          item.className = 'belt-item';
          item.innerHTML = icons[bc.from % icons.length];
          item.style.top = '-3px';
          if (bc.type === 'horizontal') {
            belt.style.position = 'absolute';
            belt.style.overflow = 'hidden';
          }
          belt.appendChild(item);
        }
      });

      // Draw machines
      tasks.forEach((task, i) => {
        if (i >= positions.length) return;
        const pos = positions[i];
        const machine = document.createElement('div');
        const statusClass = task.status === 'running' ? 'running' : task.lastResult === 'error' ? 'error' : 'idle';
        machine.className = `machine ${statusClass}`;
        machine.style.left = pos.x + 'px';
        machine.style.top = pos.y + 'px';
        machine.onclick = () => showMachinePopup(task);

        const gearSymbol = task.sprite === 'lab' ? '&#128300;' : task.sprite === 'beacon' ? '&#9829;' : '&#9881;';
        const statusLabel = task.status === 'running' ? 'RUNNING' : task.lastResult === 'success' ? 'OK' : task.lastResult || 'IDLE';

        machine.innerHTML = `
          <div class="machine-gears">${gearSymbol}</div>
          <div class="machine-name">${task.name}</div>
          <div class="machine-status ${task.lastResult || 'idle'}">${statusLabel}</div>
        `;
        floor.appendChild(machine);
      });

      // Add source/sink nodes
      const sources = [
        { name: 'iCloud', x: 0, y: 5, color: 'var(--accent-blue)' },
        { name: 'Web', x: 350, y: 5, color: 'var(--accent-blue)' },
        { name: 'Reports', x: 175, y: 280, color: 'var(--accent-purple)' }
      ];

      sources.forEach(src => {
        const node = document.createElement('div');
        node.className = 'service-node';
        node.style.left = src.x + 'px';
        node.style.top = src.y + 'px';
        node.style.borderColor = src.color;
        node.style.color = src.color;
        node.textContent = `[ ${src.name} ]`;
        floor.appendChild(node);
      });
    }

    // ===== RENDER: STATS =====
    function renderStats() {
      const el = document.getElementById('statCards');
      if (!metricsData) return;
      const d = metricsData.daily;
      const stats = [
        { label: 'Tasks / Day', value: d.tasksCompleted, max: 20 },
        { label: 'Emails / Day', value: d.emailsProcessed, max: 15 },
        { label: 'Files Created', value: d.filesCreated, max: 10 },
        { label: 'Research (hrs)', value: d.researchHours, max: 8 }
      ];

      el.innerHTML = stats.map(s => {
        const pct = Math.min(100, (s.value / s.max) * 100);
        return `
          <div class="stat-card">
            <div class="stat-label">${s.label}</div>
            <div class="stat-bar-row">
              <div class="stat-bar">
                <div class="stat-bar-fill" style="width:${pct}%"></div>
              </div>
              <span class="stat-value">${s.value}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // ===== RENDER: SPARKLINE =====
    function renderSparkline() {
      const el = document.getElementById('sparkline');
      if (!metricsData || !metricsData.tokenHistory) return;

      const hist = metricsData.tokenHistory;
      const maxTokens = Math.max(...hist.map(h => h.tokens));

      el.innerHTML = hist.map((h, i) => {
        const pct = (h.tokens / maxTokens) * 100;
        return `<div class="sparkline-bar" style="height:${pct}%" title="${h.date}: ${(h.tokens/1000).toFixed(0)}K"></div>`;
      }).join('');

      document.getElementById('sparklineStart').textContent = hist[0]?.date?.slice(5) || '--';
      document.getElementById('sparklineEnd').textContent = hist[hist.length - 1]?.date?.slice(5) || '--';
    }

    // ===== RENDER: COSTS =====
    function renderCosts() {
      if (!metricsData) return;
      document.getElementById('costToday').textContent = `$${metricsData.daily.estimatedCost.toFixed(2)}`;
      document.getElementById('costWeek').textContent = `$${metricsData.weekly.estimatedCost.toFixed(2)}`;
    }

    // ===== RENDER: SCHEDULE =====
    function renderSchedule() {
      const el = document.getElementById('scheduleList');
      if (!tasksData) return;

      el.innerHTML = tasksData.tasks
        .filter(t => t.nextRun || t.schedule)
        .map(t => {
          const nextTime = t.nextRun ? new Date(t.nextRun).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : t.schedule;
          const dotClass = t.lastResult === 'success' ? 'success' : 'pending';
          return `
            <div class="schedule-item">
              <span class="schedule-name">${t.name}</span>
              <span class="schedule-time">${nextTime}</span>
              <span class="schedule-dot ${dotClass}"></span>
            </div>
          `;
        }).join('');
    }

    // ===== RENDER: TICKER =====
    function renderTicker() {
      const el = document.getElementById('ticker');
      if (!activityData) return;

      el.innerHTML = activityData.events.map(ev => {
        const cls = ev.status === 'success' ? 'success' : ev.status === 'error' ? 'error' : 'info';
        const icon = ev.status === 'success' ? '&#10003;' : ev.status === 'error' ? '&#9888;' : '&#9654;';
        const time = new Date(ev.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<span class="ticker-item ${cls}"><span class="ticker-time">${time}</span><span class="tick-icon">${icon}</span>${ev.message}</span>`;
      }).join('');
    }

    // ===== HEALTH BAR =====
    function updateHealth() {
      if (!servicesData) return;
      const total = servicesData.services.length;
      const active = servicesData.services.filter(s => s.status === 'active').length;
      const pct = Math.round((active / total) * 100);
      document.getElementById('healthBar').style.width = pct + '%';
      document.getElementById('healthLabel').textContent = pct + '%';

      const bar = document.getElementById('healthBar');
      if (pct >= 75) bar.style.background = 'var(--accent-green)';
      else if (pct >= 50) bar.style.background = 'var(--accent-yellow)';
      else bar.style.background = 'var(--accent-red)';
    }

    // ===== UPTIME =====
    function updateUptime() {
      if (!metricsData) return;
      document.getElementById('uptime').textContent = `UPTIME: ${metricsData.uptimeDays}d`;
    }

    // ===== MACHINE POPUP =====
    function showMachinePopup(task) {
      document.getElementById('popupTitle').textContent = task.name;
      const body = document.getElementById('popupBody');

      const rows = [
        ['Status', task.status],
        ['Last Result', task.lastResult || '--'],
        ['Schedule', task.schedule || task.cronExpression || 'On-demand'],
        ['Last Run', task.lastRun ? timeAgo(task.lastRun) : 'Never'],
        ['Next Run', task.nextRun ? new Date(task.nextRun).toLocaleString() : '--'],
        ['Success Rate', task.metrics ? (task.metrics.successRate * 100).toFixed(0) + '%' : '--'],
        ['Total Runs', task.metrics?.runsTotal ?? '--'],
        ['Avg Duration', task.metrics?.avgDurationSec ? task.metrics.avgDurationSec + 's' : '--'],
        ['Inputs', (task.inputSources || []).join(', ') || '--'],
        ['Outputs', (task.outputTargets || []).join(', ') || '--']
      ];

      body.innerHTML = rows.map(([k, v]) => `
        <div class="popup-row">
          <span class="popup-key">${k}</span>
          <span class="popup-val">${v}</span>
        </div>
      `).join('');

      document.getElementById('popupOverlay').classList.add('visible');
    }

    function closePopup() {
      document.getElementById('popupOverlay').classList.remove('visible');
    }

    document.getElementById('popupOverlay').addEventListener('click', function(e) {
      if (e.target === this) closePopup();
    });

    // ===== HELPERS =====
    function timeAgo(isoStr) {
      const diff = Date.now() - new Date(isoStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePopup();
    });

    // ===== INIT =====
    refreshData();
    // Auto-refresh every 30 seconds
    setInterval(refreshData, 30000);
  </script>
</body>
</html>
